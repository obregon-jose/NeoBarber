<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="home" href="/dashboard/home">
      <ion-icon aria-hidden="true" name="home"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="reservation" href="/dashboard/reservation" *ngIf="showTab('cliente')">
      <ion-icon aria-hidden="true" name="create"></ion-icon>
      <ion-label>Reservación</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="service" href="/dashboard/service" *ngIf="showTab('barber')">
      <ion-icon aria-hidden="true" name="cut"></ion-icon>
      <ion-label>Servicios</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="attention" href="/dashboard/attention" *ngIf="showTab('barber')">
      <ion-icon aria-hidden="true" name="create"></ion-icon>
      <ion-label>Atención</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile" href="/dashboard/profile">
      <ion-icon aria-hidden="true" name="person"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
